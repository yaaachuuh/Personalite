<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Scroll Concept</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main" data-scroll-container>
        <canvas id="carCanvas"></canvas>
        <div id="page" class="section" data-scroll-section><h1>DRIVEN</h1></div>
        <div id="page1" class="section" data-scroll-section><h2>Top Speed: 350 km/h</h2></div>
        <div id="page2" class="section" data-scroll-section><h2>0-100: 2.6s</h2></div>
        <div id="page3" class="section" data-scroll-section><h2>Exploded View</h2></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="script.js"></script>

</html>
